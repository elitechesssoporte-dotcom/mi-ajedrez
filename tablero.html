<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FighterChess - Partida</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .contenedor-principal {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .area-botones {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn-partida {
            width: 150px;
            padding: 15px;
            border: 2px solid #444;
            border-radius: 8px;
            background: #222;
            color: white;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-partida:hover {
            background: #333;
            border-color: #666;
        }
        .btn-revancha {
            border-color: #4CAF50;
            color: #4CAF50;
        }
        .btn-revancha:hover {
            background: #4CAF50;
            color: white;
        }
        .btn-tablas {
            border-color: #c4a028;
            color: #c4a028;
        }
        .btn-tablas:hover {
            background: #c4a028;
            color: black;
        }
        .btn-abandonar {
            border-color: #f44336;
            color: #f44336;
        }
		.btn-salir {
			border-color: #2196F3;
			color: #2196F3;
		}
		.btn-salir:hover:not(:disabled) {
			background: #2196F3;
			color: white;
		}
		.btn-salir:disabled {
			opacity: 0.4;
			cursor: not-allowed;
		}
        .btn-abandonar:hover {
            background: #f44336;
            color: white;
        }
        .area-juego {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .player-info {
            width: 600px;
            background: #222;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #444;
        }
        .player-info.activo {
            border-color: #c4a028;
            background: #1a1a00;
        }
        .reloj {
            font-size: 1.5em;
            font-weight: bold;
            font-family: monospace;
        }
        #board {
            width: 600px;
            margin: 10px 0;
        }
        #info-jugador {
            color: #888;
            margin-top: 10px;
            text-align: center;
        }
        
        /* Panel de notación */
        .area-notacion {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 760px;
        }
        .panel-notacion {
            width: 280px;
            height: 600px;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .notacion-header {
            background: #1a1a00;
            border-bottom: 2px solid #c4a028;
            padding: 12px;
            text-align: center;
            color: #c4a028;
            font-weight: bold;
            font-size: 1.1em;
        }
        .notacion-contenido {
			flex: 1;
			overflow-y: auto;
			padding: 10px;
			font-family: 'Courier New', monospace;
			font-size: 1em;
		}

		.fila-movimiento {
			display: grid;
			grid-template-columns: 40px 100px 100px;
			gap: 10px;
			padding: 3px 0;
			border-bottom: 1px solid #333;
		}

		.fila-movimiento:hover {
			background: #2a2a00;
		}

		.numero-movimiento {
			color: #c4a028;
			font-weight: bold;
			text-align: right;
			padding-right: 10px;
		}

		.celda-blanco, .celda-negro {
			padding: 2px 5px;
			border-radius: 3px;
			cursor: pointer;
			transition: background 0.2s;
		}

		.celda-blanco:hover, .celda-negro:hover {
			background: #333;
		}

		.celda-blanco.activo, .celda-negro.activo {
			background: #c4a028;
			color: black;
		}

		.figurine {
			font-size: 1.3em;
			margin-right: 2px;
		}

		.figurine-blanco {
			color: #fff;
			text-shadow: 0 0 2px #000;
		}

		.figurine-negro {
			color: #333;
			text-shadow: 0 0 2px #fff;
		}
        
        /* Botones de reproducción */
        .controles-reproduccion {
            width: 280px;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .btn-reproduccion {
            width: 50px;
            height: 50px;
            border: 2px solid #444;
            border-radius: 8px;
            background: #111;
            color: #c4a028;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-reproduccion:hover {
            background: #1a1a00;
            border-color: #c4a028;
            transform: scale(1.1);
        }
        .btn-reproduccion:active {
            transform: scale(0.95);
        }
        .btn-reproduccion:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-reproduccion:disabled:hover {
            transform: none;
            background: #111;
            border-color: #444;
        }
        
        /* Modal de promoción */
        .modal-promocion {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-promocion.activo {
            display: flex;
        }
        .modal-contenido {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #c4a028;
            text-align: center;
        }
        .modal-contenido h3 {
            color: #c4a028;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        .opciones-piezas {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .opcion-pieza {
            width: 80px;
            height: 80px;
            cursor: pointer;
            border: 2px solid #444;
            border-radius: 8px;
            background: #111;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .opcion-pieza:hover {
            border-color: #c4a028;
            background: #1a1a00;
            transform: scale(1.1);
        }
        .opcion-pieza img {
            width: 60px;
            height: 60px;
        }
		/* Resaltado de premovimiento */
		.premove-source {
			box-shadow: 0 0 20px #c4a028 !important;
			background: rgba(196, 160, 40, 0.5) !important;
		}

		.premove-target {
			background: rgba(196, 160, 40, 0.3) !important;
			box-shadow: inset 0 0 15px #c4a028 !important;
		}

		.premove-source::before,
		.premove-target::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			pointer-events: none;
		}
		/* Adaptación completa para móvil */
@media (max-width: 768px) {
    body {
        overflow: hidden;
        touch-action: none;
    }
    
    .contenedor-principal {
        flex-direction: column !important;
        gap: 10px !important;
        padding: 15px 5px 10px 5px !important;
        width: 100% !important;
        max-width: 100vw;
        margin-top: 10px !important;
    }
    
    /* Botones arriba en fila */
    .area-botones {
        flex-direction: row !important;
        width: 100% !important;
        justify-content: center;
        gap: 5px !important;
        order: 1;
        padding-top: 10px !important;
        margin-bottom: 5px !important;
    }
    
    .btn-partida {
        width: auto !important;
        padding: 8px 12px !important;
        font-size: 0.8em !important;
        flex: 1;
    }
    
    /* Área de juego centrada */
    .area-juego {
        width: 100% !important;
        order: 2;
    }
    
    .player-info {
        width: 100% !important;
        max-width: 100vw;
        padding: 8px 12px !important;
    }
    
    #board {
        width: 100% !important;
        max-width: 100vw;
        margin: 5px 0 !important;
    }
    
    /* En móvil: ocultar notación pero mostrar controles */
    .area-notacion {
        display: flex !important;
        flex-direction: column;
        gap: 10px;
        order: 3;
    }

    .panel-notacion {
        display: none !important;
    }

    .controles-reproduccion {
        width: 100% !important;
        max-width: 400px;
        margin: 0 auto;
        background: #222;
        border: 2px solid #444;
        border-radius: 8px;
        padding: 10px;
        display: flex !important;
        justify-content: space-around;
        align-items: center;
        order: 3;
    }

    .controles-reproduccion .btn-reproduccion {
        width: 45px !important;
        height: 45px !important;
        font-size: 1.1em !important;
    }
    
    .reloj {
        font-size: 1.2em !important;
    }
}
        /* Resaltado de Jaque */
        .check-highlight {
            box-shadow: inset 0 0 15px 5px rgba(255, 0, 0, 0.8) !important;
            background-color: rgba(255, 0, 0, 0.5) !important;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

<div class="contenedor-principal">
    <!-- Botones a la izquierda -->
    <div class="area-botones">
        <button class="btn-partida btn-revancha" onclick="ofrecerRevancha()">🔄 Revancha</button>
        <button class="btn-partida btn-tablas" onclick="ofrecerTablas()">🤝 Tablas</button>
        <button class="btn-partida btn-abandonar" onclick="abandonarPartida()">🏳️ Abandonar</button>
		<button class="btn-partida btn-salir" id="btnSalir" onclick="salirAlMenu()" disabled>🏠 Salir al Menú</button>
    </div>
    
    <!-- Tablero y jugadores -->
    <div class="area-juego">
        <div class="player-info" id="playerRival">
            <span id="nombreRival">Rival</span>
            <div class="reloj" id="relojRival">05:00</div>
        </div>
        
        <div id="board"></div>
        
        <div class="player-info activo" id="playerYo">
            <span id="nombreYo">Tú</span>
            <div class="reloj" id="relojYo">05:00</div>
        </div>
        
        <div id="info-jugador"></div>
    </div>
    
    <!-- Panel de notación y controles a la derecha -->
    <div class="area-notacion">
        <div class="panel-notacion">
            <div class="notacion-header">📜 NOTACIÓN</div>
            <div class="notacion-contenido" id="notacionContenido">
                <div style="color: #888; text-align: center; padding: 20px;">
                    Esperando movimientos...
                </div>
            </div>
        </div>
        
        <!-- Controles de reproducción -->
        <div class="controles-reproduccion">
            <button class="btn-reproduccion" id="btnInicio" onclick="irAlInicio()" title="Ir al inicio">⏮</button>
            <button class="btn-reproduccion" id="btnAnterior" onclick="movimientoAnterior()" title="Anterior">◀</button>
            <button class="btn-reproduccion" id="btnSiguiente" onclick="movimientoSiguiente()" title="Siguiente">▶</button>
            <button class="btn-reproduccion" id="btnFinal" onclick="irAlFinal()" title="Ir al final">⏭</button>
        </div>
    </div>
</div>

<!-- Modal de promoción -->
<div class="modal-promocion" id="modalPromocion">
    <div class="modal-contenido">
        <h3>Elige pieza para la promoción</h3>
        <div class="opciones-piezas" id="opcionesPiezas"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
    const socket = io();


const salaId = localStorage.getItem('salaId');
let miColor = localStorage.getItem('miColor');
const rivalNick = localStorage.getItem('rivalNick') || 'Rival';
const miNick = localStorage.getItem('nickJugador') || 'Tú';
const tiempoMinutos = parseInt(localStorage.getItem('tiempoPartida')) || 5;
const incremento = parseInt(localStorage.getItem('incrementoPartida')) || 0;
let miElo = localStorage.getItem('miElo') || 1200;
let rivalElo = localStorage.getItem('rivalElo') || 1200;

function actualizarNombresJugadores() {
    var miTexto = miColor === 'white' ? miNick + ' (' + miElo + ') (Blancas)' : miNick + ' (' + miElo + ') (Negras)';
    var rivalTexto = miColor === 'white' ? rivalNick + ' (' + rivalElo + ') (Negras)' : rivalNick + ' (' + rivalElo + ') (Blancas)';
    
    document.getElementById('nombreYo').innerText = miTexto;
    document.getElementById('nombreRival').innerText = rivalTexto;
}

console.log('CONECTANDO - Sala:', salaId, '| Mi color:', miColor, '| Mi nick:', miNick, '| Rival:', rivalNick);
    
    var game = new Chess();
    var board = null;
    var intervaloReloj = null;
    var segundosBlanco = tiempoMinutos * 60;
    var segundosNegro = tiempoMinutos * 60;
    var movimientoPendiente = null;
    var partidaFinalizada = false;
    var revanchaPendiente = false;
    var listaMovimientos = [];
    var posicionActual = 0;
    var modoReproduccion = false;
	var premove = null;
	var premoveActivo = false;
    
    // Variables para sistema de desconexión
    var temporizadorDesconexion = null;
    var verificacionPartida = null;
    
    var miTexto = miColor === 'white' ? miNick + ' (' + miElo + ') (Blancas)' : miNick + ' (' + miElo + ') (Negras)';
    var rivalTexto = miColor === 'white' ? rivalNick + ' (' + rivalElo + ') (Negras)' : rivalNick + ' (' + rivalElo + ') (Blancas)';
    
    document.getElementById('nombreYo').innerText = miTexto;
    document.getElementById('nombreRival').innerText = rivalTexto;
    
socket.on('connect', function() {
    const nickGuardado = localStorage.getItem('nickJugador');
    if (nickGuardado) {
        console.log('Re-registrando sesión en tablero:', nickGuardado);
        socket.emit('reconectar_sesion', { nick: nickGuardado });
        
        setTimeout(function() {
            if (salaId) {
                socket.emit('reunirse_a_sala', { sala: salaId });
                console.log('Unido a la sala:', salaId);
				socket.emit('solicitar_estado_partida', { sala: salaId });
            }
        }, 100);
    } else {
        if (salaId) {
            socket.emit('reunirse_a_sala', { sala: salaId });
            console.log('Unido a la sala:', salaId);
        }
    }
});
    
    // FUNCIONES DE NOTACIÓN
    
    const figurines = {
        'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '',
        'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': ''
    };
    
    function convertirAFigurines(nota, color) {
    if (nota === 'O-O' || nota === 'O-O-O') {
        return nota;
    }
    
    let resultado = '';
    let i = 0;
    
    let promocion = null;
    if (nota.includes('=')) {
        let partes = nota.split('=');
        nota = partes[0];
        promocion = partes[1];
    }
    
    while (i < nota.length) {
        let char = nota[i];
        
        if ('KQRBN'.includes(char)) {
            if (color === 'w') {
                resultado += '<span class="figurine figurine-blanco">' + figurines[char] + '</span>';
            } else {
                resultado += '<span class="figurine figurine-negro">' + figurines[char.toLowerCase()] + '</span>';
            }
            i++;
        } 
        else if (char >= 'a' && char <= 'h') {
            if (i + 1 < nota.length && nota[i+1] === 'x') {
                if (color === 'w') {
                    resultado += '<span class="figurine figurine-blanco">' + figurines['P'] + '</span>';
                } else {
                    resultado += '<span class="figurine figurine-negro">' + figurines['p'] + '</span>';
                }
            }
            resultado += nota.substring(i);
            break;
        }
        else {
            resultado += nota.substring(i);
            break;
        }
    }
    
    if (promocion) {
        resultado += '=';
        let piezaPromocion = '';
        if (color === 'w') {
            if (promocion === 'Q') piezaPromocion = '♕';
            else if (promocion === 'R') piezaPromocion = '♖';
            else if (promocion === 'B') piezaPromocion = '♗';
            else if (promocion === 'N') piezaPromocion = '♘';
            resultado += '<span class="figurine figurine-blanco">' + piezaPromocion + '</span>';
        } else {
            if (promocion === 'Q') piezaPromocion = '♛';
            else if (promocion === 'R') piezaPromocion = '♜';
            else if (promocion === 'B') piezaPromocion = '♝';
            else if (promocion === 'N') piezaPromocion = '♞';
            resultado += '<span class="figurine figurine-negro">' + piezaPromocion + '</span>';
        }
    }
    
    return resultado;
}
    
    function agregarMovimientoANotacion(move) {
        if (listaMovimientos.length === 0 || listaMovimientos[listaMovimientos.length - 1].negras !== null) {
            listaMovimientos.push({
                numero: listaMovimientos.length + 1,
                blancas: move.san,
                negras: null,
                fenBlancas: null,
                fenNegras: null
            });
            listaMovimientos[listaMovimientos.length - 1].fenBlancas = game.fen();
        } else {
            listaMovimientos[listaMovimientos.length - 1].negras = move.san;
            listaMovimientos[listaMovimientos.length - 1].fenNegras = game.fen();
        }
        
        posicionActual = listaMovimientos.length * 2 - (listaMovimientos[listaMovimientos.length - 1].negras ? 0 : 1);
        actualizarPanelNotacion();
        actualizarBotonesReproduccion();
    }
    function anadirResultadoANotacion(resultado) {
    var contenido = document.getElementById('notacionContenido');
    
    var filaResultado = document.createElement('div');
    filaResultado.className = 'fila-movimiento';
    filaResultado.style.borderTop = '2px solid #c4a028';
    filaResultado.style.marginTop = '10px';
    filaResultado.style.paddingTop = '10px';
    
    filaResultado.innerHTML = `
        <span class="numero-movimiento" style="color: #fff;">FIN</span>
        <span style="grid-column: span 2; text-align: center; font-size: 1.3em; font-weight: bold; color: #c4a028;">
            ${resultado}
        </span>
    `;
    
    contenido.appendChild(filaResultado);
    contenido.scrollTop = contenido.scrollHeight;
    
    console.log('Resultado añadido a notación:', resultado);
}
    function actualizarPanelNotacion() {
    var contenido = document.getElementById('notacionContenido');
    var html = '';
    
    listaMovimientos.forEach(function(mov, index) {
        html += '<div class="fila-movimiento">';
        
        html += '<span class="numero-movimiento">' + mov.numero + '.</span>';
        
        var figurinesBlancas = convertirAFigurines(mov.blancas, 'w');
        var claseBlancas = (index * 2 + 1 === posicionActual) ? 'celda-blanco activo' : 'celda-blanco';
        html += '<span class="' + claseBlancas + '" onclick="irAPosicion(' + (index * 2 + 1) + ')">' + figurinesBlancas + '</span>';
        
        if (mov.negras) {
            var figurinesNegras = convertirAFigurines(mov.negras, 'b');
            var claseNegras = (index * 2 + 2 === posicionActual) ? 'celda-negro activo' : 'celda-negro';
            html += '<span class="' + claseNegras + '" onclick="irAPosicion(' + (index * 2 + 2) + ')">' + figurinesNegras + '</span>';
        } else {
            html += '<span></span>';
        }
        
        html += '</div>';
    });
    
    contenido.innerHTML = html;
    
    if (posicionActual >= listaMovimientos.length * 2 - 1) {
        contenido.scrollTop = contenido.scrollHeight;
    }
}
    
    function resetearNotacion() {
        listaMovimientos = [];
        posicionActual = 0;
        modoReproduccion = false;
        var contenido = document.getElementById('notacionContenido');
        contenido.innerHTML = '<div style="color: #888; text-align: center; padding: 20px;">Esperando movimientos...</div>';
        actualizarBotonesReproduccion();
    }
    
    // FUNCIONES DE REPRODUCCIÓN
    
    function irAPosicion(pos) {
    if (pos < 0 || pos > listaMovimientos.length * 2) return;
    
    modoReproduccion = true;
    posicionActual = pos;
    
    if (pos === 0) {
        board.position('start');
        actualizarPanelNotacion();
        actualizarBotonesReproduccion();
        return;
    }
    
    var gameTemp = new Chess();
    
    for (var i = 0; i < listaMovimientos.length; i++) {
        var mov = listaMovimientos[i];
        
        if (mov.blancas) {
            gameTemp.move(mov.blancas);
            if (i * 2 + 1 === posicionActual) break;
        }
        
        if (mov.negras) {
            gameTemp.move(mov.negras);
            if (i * 2 + 2 === posicionActual) break;
        }
    }
    
    board.position(gameTemp.fen());
    actualizarPanelNotacion();
    actualizarBotonesReproduccion();
}
    
    function irAlInicio() {
        if (listaMovimientos.length === 0) return;
        irAPosicion(0);
    }
    
    function movimientoAnterior() {
        if (posicionActual > 0) {
            irAPosicion(posicionActual - 1);
        }
    }
    
    function movimientoSiguiente() {
        var maxPos = listaMovimientos.length * 2;
        if (listaMovimientos.length > 0 && listaMovimientos[listaMovimientos.length - 1].negras === null) {
            maxPos--;
        }
        if (posicionActual < maxPos) {
            irAPosicion(posicionActual + 1);
        }
    }
    
    function irAlFinal() {

    function verificarEstadoPartida() {

    socket.emit('verificar_partida', { sala: salaId }, function(response) {
        console.log('Verificación partida:', response);
        
        if (response && response.terminada && !partidaFinalizada) {

            requestAnimationFrame(function() {
                if (response.elo_blanco !== undefined && response.elo_negro !== undefined) {
                    if (miColor === 'white') {
                        miElo = response.elo_blanco;
                        rivalElo = response.elo_negro;
                    } else {

                    localStorage.setItem('miElo', miElo);
                    localStorage.setItem('rivalElo', rivalElo);
                    
                    var miTexto = miColor === 'white' ? miNick + ' (' + miElo + ') (Blancas)' : miNick + ' (' + miElo + ') (Negras)';
                    var rivalTexto = miColor === 'white' ? rivalNick + ' (' + rivalElo + ') (Negras)' : rivalNick + ' (' + rivalElo + ') (Blancas)';
                    
                    document.getElementById('nombreYo').innerText = miTexto;
                    document.getElementById('nombreRival').innerText = rivalTexto;
                }
                
                if (intervaloReloj) {
                    clearInterval(intervaloReloj);
                    intervaloReloj = null;
                }
                
                document.getElementById('btnSalir').disabled = false;
                
                // 🔥 NUEVO: Usar setTimeout para asegurar que el navegador procese los cambios
                setTimeout(function() { 
                    alert('¡Tu rival se desconectó y no volvió! Has ganado.'); 
                }, 200);
            });
        } else if (response && response.rival_conectado) {
            console.log('Rival reconectado detectado');
            
            if (temporizadorDesconexion) {
                clearInterval(temporizadorDesconexion);
                temporizadorDesconexion = null;
            }
            if (verificacionPartida) {
                clearInterval(verificacionPartida);
                verificacionPartida = null;
            }

            if (contadorElement) {
                contadorElement.remove();
            }

            }
            
            iniciarReloj();
            
            mostrarAvisoTemporal('🟢 Tu oponente se ha reconectado. La partida continúa.');
        }
    });
}

socket.on('estado_partida', function(data) {
    console.log('Estado de partida recibido:', data);
    
    // 1. Restaurar posición del tablero
    if (data.fen && data.fen !== 'start') {
        game.load(data.fen);
        board.position(data.fen);
        resaltarJaque();  // ✅ Esta es la llamada que añadimos
    }
    
    // 2. RESTAURAR TIEMPOS ACTUALES
    if (data.segundos_blanco !== undefined && data.segundos_blanco !== null) {
        segundosBlanco = data.segundos_blanco;
        console.log('⏱️ Tiempo blancas restaurado:', segundosBlanco);
    }
    if (data.segundos_negro !== undefined && data.segundos_negro !== null) {
        segundosNegro = data.segundos_negro;
        console.log('⏱️ Tiempo negras restaurado:', segundosNegro);
    }

    // 3. ✅ NUEVO: RECONSTRUIR LA NOTACIÓN DE MOVIMIENTOS
    if (data.movimientos && Array.isArray(data.movimientos) && data.movimientos.length > 0) {
        console.log('🔄 Reconstruyendo notación con', data.movimientos.length, 'movimientos...');
        
        // Limpiamos la notación actual para evitar duplicados
        listaMovimientos = [];
        posicionActual = 0;
        
        // Usamos un juego temporal para calcular la notación (SAN) sin afectar al juego principal
        var gameTemp = new Chess();
        
        data.movimientos.forEach(function(movData) {
            var moveTemp;
            // El servidor puede enviar el objeto {from, to} o un string "e4"
            if (typeof movData === 'string') {
                moveTemp = gameTemp.move(movData);
            } else {
                moveTemp = gameTemp.move({
                    from: movData.from,
                    to: movData.to,
                    promotion: movData.promotion || 'q'
                });
            }
            
            if (moveTemp) {
                // Replicamos la lógica de tu función agregarMovimientoANotacion
                if (listaMovimientos.length === 0 || listaMovimientos[listaMovimientos.length - 1].negras !== null) {
                    listaMovimientos.push({
                        numero: listaMovimientos.length + 1,
                        blancas: moveTemp.san,
                        negras: null
                    });
                } else {
                    listaMovimientos[listaMovimientos.length - 1].negras = moveTemp.san;
                }
            }
        });
        
        // Posicionar el scroll y los botones al final de la partida
        posicionActual = listaMovimientos.length * 2;
        if (listaMovimientos.length > 0 && listaMovimientos[listaMovimientos.length - 1].negras === null) {
            posicionActual--;
        }
        
        actualizarPanelNotacion();
        actualizarBotonesReproduccion();
        console.log('✅ Notación reconstruida correctamente');
    } else {
        // Si no hay movimientos, limpiamos el panel
        resetearNotacion();
    }
    
    // 4. Actualizar relojes en pantalla
    actualizarRelojes();
    actualizarTurno();
    
    // 5. Reanudar reloj si la partida no ha terminado
    if (!data.terminada && !partidaFinalizada) {
        iniciarReloj();
        console.log('⏱️ Reloj reanudado tras reconexión');
    }
});

    function formatearTiempo(segs) {
        var m = Math.floor(segs / 60);
        var s = segs % 60;
        return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
    }
    
    function actualizarRelojes() {
        var relojYo = document.getElementById('relojYo');
        var relojRival = document.getElementById('relojRival');
        
        if (miColor === 'white') {
            if (relojYo) relojYo.innerText = formatearTiempo(segundosBlanco);
            if (relojRival) relojRival.innerText = formatearTiempo(segundosNegro);
        } else {
            if (relojYo) relojYo.innerText = formatearTiempo(segundosNegro);
            if (relojRival) relojRival.innerText = formatearTiempo(segundosBlanco);
        }
    }
    
    function iniciarReloj() {
    if (intervaloReloj) clearInterval(intervaloReloj);
    
    var contadorSegundos = 0;
    
    intervaloReloj = setInterval(function() {
        if (game.game_over()) {
            clearInterval(intervaloReloj);
            return;
        }
        
        if (game.turn() === 'w') {
            segundosBlanco--;
            if (segundosBlanco <= 0) {
                segundosBlanco = 0;
                clearInterval(intervaloReloj);
                socket.emit('fin_partida', { sala: salaId, motivo: 'tiempo', ganador: 'black' });
                alert('⏰ ¡Tiempo! Ganan las negras');
            }
        } else {
            segundosNegro--;
            if (segundosNegro <= 0) {
                segundosNegro = 0;
                clearInterval(intervaloReloj);
                socket.emit('fin_partida', { sala: salaId, motivo: 'tiempo', ganador: 'white' });
                alert('⏰ ¡Tiempo! Ganan las blancas');
            }
        }
        
        actualizarRelojes();
        
        // ✅ ENVIAR TIEMPOS AL SERVIDOR CADA 5 SEGUNDOS
        contadorSegundos++;
        if (contadorSegundos >= 5) {
            socket.emit('actualizar_tiempos', {
                sala: salaId,
                segundos_blanco: segundosBlanco,
                segundos_negro: segundosNegro
            });
            contadorSegundos = 0;
        }
    }, 1000);
    
    console.log('⏱️ Reloj iniciado');
}
    
    function actualizarTurno() {
        var playerYo = document.getElementById('playerYo');
        var playerRival = document.getElementById('playerRival');
        var info = document.getElementById('info-jugador');
        
        var esMiTurno = false;
        if (miColor === 'white' && game.turn() === 'w') esMiTurno = true;
        if (miColor === 'black' && game.turn() === 'b') esMiTurno = true;
        
        if (esMiTurno) {
            if (playerYo) playerYo.classList.add('activo');
            if (playerRival) playerRival.classList.remove('activo');
        } else {
            if (playerRival) playerRival.classList.add('activo');
            if (playerYo) playerYo.classList.remove('activo');
        }
        
        var turnoTexto = game.turn() === 'w' ? 'Blancas' : 'Negras';
        if (info) info.innerText = 'Turno: ' + turnoTexto;
    }
    
    function onDragStart(source, piece) {
    if (partidaFinalizada) {
        return false;
    }
    
    if (game.game_over()) {
        return false;
    }
    
    if (modoReproduccion) {
        alert('Estás en modo reproducción. Haz clic en el último movimiento para volver a la partida.');
        return false;
    }
    
    var esMiTurno = false;
    if (miColor === 'white' && game.turn() === 'w') esMiTurno = true;
    if (miColor === 'black' && game.turn() === 'b') esMiTurno = true;
    
    if (!esMiTurno) {
        if ((miColor === 'white' && piece.search(/^b/) !== -1) ||
            (miColor === 'black' && piece.search(/^w/) !== -1)) {
            return false;
        }
        console.log('Preparando premovimiento...');
        return true;
    }
    
    if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
        (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
        return false;
    }
}
    
function onDrop(source, target) {
    console.log('Movimiento:', source, '->', target);
    
    var esMiTurno = false;
    if (miColor === 'white' && game.turn() === 'w') esMiTurno = true;
    if (miColor === 'black' && game.turn() === 'b') esMiTurno = true;
    
    if (!esMiTurno) {
    premove = { from: source, to: target };
    premoveActivo = true;
    
    console.log('Premovimiento guardado:', source, '->', target);
    
    // Aplicar el resaltado DESPUÉS de que chessboard.js termine el snapback
    setTimeout(function() {
        resaltarPremove(source, target);
        console.log('Resalte de premove aplicado:', source, '->', target);
    }, 200);
    
    return 'snapback';
}
    
    var move = game.move({
        from: source,
        to: target,
        promotion: 'q'
    });
    
    if (move === null) return 'snapback';
    
    if (move.promotion) {
        game.undo();
        movimientoPendiente = { from: source, to: target };
        mostrarModalPromocion();
        return 'snapback';
    }
    
    agregarMovimientoANotacion(move);
    aplicarIncremento(miColor);
    
    socket.emit('mover_pieza', {
        sala: salaId,
        movimiento: {
            from: move.from,
            to: move.to,
            promotion: move.promotion
        },
        fen: game.fen(),
        segundos_blanco: segundosBlanco,
        segundos_negro: segundosNegro
    });
    
    actualizarTurno();
    actualizarRelojes();
    
    console.log('Movimiento enviado - FEN:', game.fen().substring(0, 50));
    comprobarFinDePartida();
}
    
    function onSnapEnd() {
    board.position(game.fen());  // ✅ Necesario para movimientos reales
	resaltarJaque();
    
    // ✅ Para premove: reaplicar resaltado (el FEN no cambió, así que no hay doble animación)
    if (premoveActivo && premove) {
        setTimeout(function() {
            resaltarPremove(premove.from, premove.to);
        }, 50);
    }
}
    
    function mostrarModalPromocion() {
        var modal = document.getElementById('modalPromocion');
        var opciones = document.getElementById('opcionesPiezas');
        
        var colorPieza = game.turn();
        var prefijo = colorPieza === 'w' ? 'w' : 'b';
        
        var piezas = [
            { tipo: 'q', nombre: 'Dama', archivo: 'Q' },
            { tipo: 'r', nombre: 'Torre', archivo: 'R' },
            { tipo: 'b', nombre: 'Alfil', archivo: 'B' },
            { tipo: 'n', nombre: 'Caballo', archivo: 'N' }
        ];
        
        opciones.innerHTML = '';
        piezas.forEach(function(pieza) {
            var div = document.createElement('div');
            div.className = 'opcion-pieza';
            div.title = pieza.nombre;
            div.onclick = function() {
                elegirPiezaPromocion(pieza.tipo);
            };
            
            var img = document.createElement('img');
            img.src = 'https://chessboardjs.com/img/chesspieces/wikipedia/' + prefijo + pieza.archivo + '.png';
            img.alt = pieza.nombre;
            
            div.appendChild(img);
            opciones.appendChild(div);
        });
        
        modal.classList.add('activo');
        console.log('Modal de promoción abierto');
    }
    
    function elegirPiezaPromocion(tipoPieza) {
    if (!movimientoPendiente) return;
    
    console.log('Promoción elegida:', tipoPieza);
    
    var move = game.move({
        from: movimientoPendiente.from,
        to: movimientoPendiente.to,
        promotion: tipoPieza
    });
    
    if (move === null) {
        console.error('Error en promoción');
        cerrarModalPromocion();
        return;
    }
    
    agregarMovimientoANotacion(move);
    aplicarIncremento(miColor);
    
    socket.emit('mover_pieza', {
        sala: salaId,
        movimiento: {
            from: move.from,
            to: move.to,
            promotion: move.promotion
        },
        fen: game.fen(),
        segundos_blanco: segundosBlanco,
        segundos_negro: segundosNegro
    });
    
    
    actualizarTurno();
    actualizarRelojes();
    
    cerrarModalPromocion();
    console.log('Promoción enviada - Turno:', game.turn());
    comprobarFinDePartida();
}
    
    function cerrarModalPromocion() {
        var modal = document.getElementById('modalPromocion');
        modal.classList.remove('activo');
        movimientoPendiente = null;
    }
    
    function aplicarIncremento(color) {
        if (color === 'white') {
            segundosBlanco += incremento;
            console.log('Incremento aplicado - Blancas:', segundosBlanco);
        } else {
            segundosNegro += incremento;
            console.log('Incremento aplicado - Negras:', segundosNegro);
        }
    }
	
	function verificarMaterialInsuficiente() {
    var board = game.board();
    var piezasBlancas = [];
    var piezasNegras = [];
    
    for (var i = 0; i < 8; i++) {
        for (var j = 0; j < 8; j++) {
            var p = board[i][j];
            if (p && p.type !== 'k') { 
                if (p.color === 'w') piezasBlancas.push(p.type);
                else piezasNegras.push(p.type);
            }
        }
    }
    
    if (piezasBlancas.length === 0 && piezasNegras.length === 0) return true;
    
    if (piezasBlancas.length === 0 && piezasNegras.length === 1 && (piezasNegras[0] === 'b' || piezasNegras[0] === 'n')) return true;
    if (piezasNegras.length === 0 && piezasBlancas.length === 1 && (piezasBlancas[0] === 'b' || piezasBlancas[0] === 'n')) return true;
    
    if (piezasBlancas.length === 1 && piezasNegras.length === 1) {
        var p1 = piezasBlancas[0];
        var p2 = piezasNegras[0];
        if ((p1 === 'b' || p1 === 'n') && (p2 === 'b' || p2 === 'n')) return true;
    }
    
    return false;
}
    
function comprobarFinDePartida() {
    if (partidaFinalizada) return;
    
    if (game.in_checkmate()) {
        partidaFinalizada = true;
        var ganador = game.turn() === 'w' ? 'black' : 'white';
        var ganadorTexto = game.turn() === 'w' ? 'Negras' : 'Blancas';
        
        socket.emit('fin_partida', { sala: salaId, motivo: 'jaque_mate', ganador: ganador });
        document.getElementById('btnSalir').disabled = false;
        deshabilitarBotonesPartida();
        
        setTimeout(function() { alert('♚ ¡JAQUE MATE! Ganan las ' + ganadorTexto); }, 300);
        return;
    }
    
    if (game.in_draw() || verificarMaterialInsuficiente()) {
        partidaFinalizada = true;
        var motivo = '';
        
        if (game.in_stalemate()) {
            motivo = '¡TABLAS por ahogado!';
        } else if (game.in_threefold_repetition()) {
            motivo = '¡TABLAS por triple repetición!';
        } else if (verificarMaterialInsuficiente()) {
            motivo = '¡TABLAS por material insuficiente!';
        } else {
            motivo = '¡TABLAS!';
        }
        
        socket.emit('fin_partida', { sala: salaId, motivo: 'tablas', ganador: 'empate' });
        document.getElementById('btnSalir').disabled = false;
        deshabilitarBotonesPartida();
        
        setTimeout(function() { alert(motivo); }, 300);
        return;
    }
    
    if (game.in_check()) {
        console.log('¡Jaque!');
    }
}

function ejecutarPremove() {
    if (!premoveActivo || !premove) {
        return;
    }
    
    eliminarResaltePremove();
    
    console.log('Ejecutando premovimiento:', premove.from, '->', premove.to);
    
    var move = game.move({
        from: premove.from,
        to: premove.to,
        promotion: 'q'
    });
    
    if (move === null) {
        console.log('Premovimiento inválido, cancelando...');
        premove = null;
        premoveActivo = false;
        return;
    }
    
    if (move.promotion) {
        game.undo();
        movimientoPendiente = { from: premove.from, to: premove.to };
        premove = null;
        premoveActivo = false;
        mostrarModalPromocion();
        return;
    }
    
    agregarMovimientoANotacion(move);
    aplicarIncremento(miColor);
    
    socket.emit('mover_pieza', {
        sala: salaId,
        movimiento: {
            from: move.from,
            to: move.to,
            promotion: move.promotion
        },
        fen: game.fen(),
        segundos_blanco: segundosBlanco,
        segundos_negro: segundosNegro
    });
	
	board.position(game.fen());
    
    actualizarTurno();
    actualizarRelojes();
    
    premove = null;
    premoveActivo = false;
    
    console.log('Premovimiento ejecutado correctamente');
    comprobarFinDePartida();
}
function resaltarJaque() {
    // 1. Limpiar cualquier resaltado de jaque anterior
    $('.square-55d63').removeClass('check-highlight');

    // 2. Verificar si el rey está en jaque
    if (game.in_check()) {
        var boardState = game.board();
        var kingColor = game.turn(); // 'w' (blancas) o 'b' (negras)
        var kingSquare = '';

        // 3. Buscar la casilla exacta del rey
        for (var i = 0; i < 8; i++) {
            for (var j = 0; j < 8; j++) {
                var piece = boardState[i][j];
                if (piece && piece.type === 'k' && piece.color === kingColor) {
                    var file = String.fromCharCode(97 + j); // 'a' hasta 'h'
                    var rank = 8 - i; // 8 hasta 1
                    kingSquare = file + rank;
                    break;
                }
            }
            if (kingSquare) break;
        }

        // 4. Aplicar la clase CSS a esa casilla
        if (kingSquare) {
            $('#board .square-' + kingSquare).addClass('check-highlight');
        }
    }
}

function resaltarPremove(source, target) {
    $('.square-55d63').removeClass('premove-source premove-target');
    
    var $sourceSquare = $('#board .square-' + source);
    if ($sourceSquare.length) {
        $sourceSquare.addClass('premove-source');
    }
    
    var $targetSquare = $('#board .square-' + target);
    if ($targetSquare.length) {
        $targetSquare.addClass('premove-target');
    }
}

function eliminarResaltePremove() {
    $('.square-55d63').removeClass('premove-source premove-target');
}
    
    function ofrecerTablas() {
    if (!partidaFinalizada) {
        socket.emit('oferta_tablas', { sala: salaId });
        console.log('Oferta de tablas enviada');
    } else {
        alert('La partida ya ha terminado');
    }
}    
    
    function ofrecerRevancha() {
    if (!partidaFinalizada) {
        alert('Debes esperar a que termine la partida para ofrecer revancha');
        return;
    }
    
    if (revanchaPendiente) {
        alert('Ya hay una solicitud de revancha pendiente');
        return;
    }
    
    if (confirm('¿Quieres ofrecer revancha a ' + rivalNick + '?')) {
        revanchaPendiente = true;
        socket.emit('oferta_revancha', { sala: salaId });
    }
}
    
    function abandonarPartida() {
    if (confirm('¿Seguro que quieres abandonar?')) {
        socket.emit('fin_partida', { sala: salaId, motivo: 'abandono', ganador: miColor === 'white' ? 'black' : 'white' });
        
        document.getElementById('btnSalir').disabled = false;
		deshabilitarBotonesPartida();
        
        partidaTerminada();
    }
}
    
    function partidaTerminada() {
    if (intervaloReloj) {
        clearInterval(intervaloReloj);
        intervaloReloj = null;
    }
    revanchaPendiente = false;
    
    document.getElementById('btnSalir').disabled = false;
}

	function salirAlMenu() {
    localStorage.removeItem('salaId');
    localStorage.removeItem('miColor');
    localStorage.removeItem('rivalNick');
    localStorage.removeItem('tiempoPartida');
    localStorage.removeItem('incrementoPartida');
    localStorage.removeItem('colorElegido');
    
    window.location.href = 'configuracion.html';
}
	
    function reiniciarPartida() {
    partidaFinalizada = false;
    game = new Chess();
    board.start();
    segundosBlanco = tiempoMinutos * 60;
    segundosNegro = tiempoMinutos * 60;
    actualizarRelojes();
    actualizarTurno();
    iniciarReloj();
}

function deshabilitarBotonesPartida() {
    var btnTablas = document.querySelector('.btn-tablas');
    var btnAbandonar = document.querySelector('.btn-abandonar');
    
    if (btnTablas) {
        btnTablas.disabled = true;
        btnTablas.style.opacity = '0.4';
        btnTablas.style.cursor = 'not-allowed';
    }
    
    if (btnAbandonar) {
        btnAbandonar.disabled = true;
        btnAbandonar.style.opacity = '0.4';
        btnAbandonar.style.cursor = 'not-allowed';
    }
    
    console.log('Botones de Tablas y Abandonar deshabilitados');
}

function habilitarBotonesPartida() {
    var btnTablas = document.querySelector('.btn-tablas');
    var btnAbandonar = document.querySelector('.btn-abandonar');
    
    if (btnTablas) {
        btnTablas.disabled = false;
        btnTablas.style.opacity = '1';
        btnTablas.style.cursor = 'pointer';
    }
    
    if (btnAbandonar) {
        btnAbandonar.disabled = false;
        btnAbandonar.style.opacity = '1';
        btnAbandonar.style.cursor = 'pointer';
    }
    
    console.log('Botones de Tablas y Abandonar reactivados');
}
    
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM cargado');
        
        var config = {
            draggable: true,
            position: 'start',
            orientation: miColor || 'white',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('board', config);
        
        console.log('Tablero inicializado');
        console.log('Orientación:', miColor);
        
        actualizarRelojes();
        iniciarReloj();
        actualizarTurno();
        actualizarBotonesReproduccion();
        
        document.getElementById('btnSalir').disabled = true;
    });

document.addEventListener('touchmove', function(e) {
    if (e.target.closest('#board')) {
        e.preventDefault();
    }
}, { passive: false });

function ajustarTableroMovil() {
    if (window.innerWidth <= 768) {
        var ancho = window.innerWidth - 10;
        var board = document.getElementById('board');
        if (board) {
            board.style.width = ancho + 'px';
            board.style.maxWidth = ancho + 'px';
        }
        
        var playerInfo = document.querySelectorAll('.player-info');
        playerInfo.forEach(function(el) {
            el.style.width = ancho + 'px';
            el.style.maxWidth = ancho + 'px';
        });
    }
}
