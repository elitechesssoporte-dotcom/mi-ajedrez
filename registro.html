<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - FighterChess</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; color: white; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: 'Inter', sans-serif; 
        }
        .login-box { 
            background: #151515; padding: 40px; border-radius: 12px; 
            border: 1px solid #333; text-align: center; width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: #d4af37; margin-bottom: 25px; font-weight: 300; }
        input { 
            padding: 12px; margin: 10px 0; width: 100%; border-radius: 6px; 
            border: 1px solid #444; background: #0a0a0a; color: white;
        }
        button { 
            padding: 12px; background: #d4af37; border: none; cursor: pointer; 
            font-weight: bold; width: 100%; border-radius: 6px; margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #f0d060; transform: translateY(-2px); }
        .enlace {
            margin-top: 20px;
            color: #888;
            font-size: 0.9em;
        }
        .enlace a {
            color: #d4af37;
            text-decoration: none;
        }
        .enlace a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Pon tu nick y contraseña para registrar</h2>
    <input type="text" id="nick" placeholder="Tu Nickname" autofocus>
    <input type="password" id="password" placeholder="Contraseña">
    <input type="password" id="password2" placeholder="Repite la contraseña">
    <button onclick="registrar()">REGISTRAR</button>
    <div class="enlace">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
    </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
    const socket = io();
    
    function registrar() {
        var nick = document.getElementById('nick').value.trim();
        var pass = document.getElementById('password').value;
        var pass2 = document.getElementById('password2').value;
        
        if (nick === "" || pass === "" || pass2 === "") {
            alert("Por favor, rellena todos los campos.");
            return;
        }
        
        if (pass !== pass2) {
            alert("Las contraseñas no coinciden.");
            return;
        }
        
        if (pass.length < 4) {
            alert("La contraseña debe tener al menos 4 caracteres.");
            return;
        }
        
        socket.emit('registro', { nick: nick, password: pass });
    }
    
    socket.on('registro_response', function(data) {
        if (data.success) {
            alert('✅ Cuenta creada correctamente.\n\nAhora puedes iniciar sesión.');
            window.location.href = 'login.html';
        } else {
            alert('❌ ' + data.message);
        }
    });

    document.getElementById('nick').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('password').focus();
        }
    });

    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('password2').focus();
        }
    });

    document.getElementById('password2').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            registrar();
        }
    });
</script>

</body>
</html>
