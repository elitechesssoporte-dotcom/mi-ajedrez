<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FighterChess - Configuración</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background: #050505; color: #c0c0c0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 40px; border-radius: 15px; text-align: center; width: 400px; border: 1px solid #333; }
        h2 { color: #d4af37; margin-bottom: 25px; }
        
        .grid-tiempos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-tiempo { padding: 10px; background: #222; border: 1px solid #444; color: white; cursor: pointer; border-radius: 5px; }
        .btn-tiempo:hover, .btn-tiempo.active { background: #c4a028; color: black; font-weight: bold; }

        label { display: block; margin-top: 15px; font-size: 0.9rem; text-align: left; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; background: #000; color: white; border: 1px solid #444; box-sizing: border-box; }
        
        #btn-jugar { width: 100%; padding: 12px; background: #c4a028; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 25px; }
        #btn-jugar:disabled { background: #555; cursor: not-allowed; }
        
        #mensaje-espera { color: #c4a028; margin-top: 15px; font-size: 0.9em; display: none; }
        
        .tiempo-personalizado {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .tiempo-personalizado input {
            flex: 1;
        }
        
        .tiempo-personalizado .unidad {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .tiempo-personalizado .unidad.active {
            background: #c4a028;
            color: black;
        }
        
		/* 📱 Adaptación para móvil */
@media (max-width: 600px) {
    body {
        height: auto;
        min-height: 100vh;
        padding: 10px;
        align-items: flex-start;
        padding-top: 20px;
    }
    
    .box {
        width: 95% !important;
        max-width: 500px;
        padding: 20px !important;
    }
    
    h2 {
        font-size: 1.3em;
        margin-bottom: 15px;
    }
    
    .grid-tiempos {
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 8px !important;
    }
    
    .btn-tiempo {
        padding: 18px 10px !important;
        font-size: 1.1em !important;
        min-height: 50px;
    }
    
    label {
        font-size: 1em;
        margin-top: 12px;
    }
    
    input {
        padding: 15px !important;
        font-size: 1.1em !important;
    }
    
    #btn-jugar {
        padding: 18px !important;
        font-size: 1.2em !important;
        margin-top: 20px;
    }
    
    #btn-cancelar {
        padding: 15px !important;
        font-size: 1.1em !important;
    }
	        /* 🆕 NUEVO: Estilo para el contador de jugadores */
        .btn-contador {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #c0c0c0;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: default; /* No muestra la mano de clic */
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: border-color 0.3s;
        }
        .btn-contador:hover {
            border-color: #c4a028;
        }
        .btn-contador span {
            font-weight: bold;
            color: #4CAF50; /* Color verde para el número */
            font-size: 1.1em;
        }
}
    </style>
</head>
<body>

<div class="box">
    <h2>TIEMPO DE PARTIDA</h2>
    <!-- 🆕 NUEVO: Botón/Indicador de jugadores en línea -->
    <button id="btn-contador" class="btn-contador" disabled>
        🟢 Jugadores en línea: <span id="numero-conectados">0</span>
    </button>
    <label>Elige los minutos:</label>
    <div class="grid-tiempos" id="selector-tiempo">
        <button class="btn-tiempo" onclick="seleccionarTiempo(1)">1</button>
        <button class="btn-tiempo" onclick="seleccionarTiempo(3)">3</button>
        <button class="btn-tiempo" onclick="seleccionarTiempo(5)">5</button>
        <button class="btn-tiempo" onclick="seleccionarTiempo(10)">10</button>
        <button class="btn-tiempo" onclick="seleccionarTiempo(15)">15</button>
        <button class="btn-tiempo" onclick="seleccionarTiempo(20)">20</button>
    </div>

    <label>Tiempo personalizado:</label>
    <div class="tiempo-personalizado">
        <input type="number" id="minutosPersonalizados" placeholder="Ej: 45, 60, 90..." min="1">
        <button class="unidad" id="btnMinutos" onclick="usarTiempoPersonalizado('minutos')">Min</button>
    </div>

    <label>Incremento (segundos):</label>
    <input type="number" id="incremento" value="0">

    <label>Elige tu color:</label>
    <div class="grid-tiempos" id="selector-color">
        <button class="btn-tiempo" onclick="seleccionarColor('white')">♔ Blancas</button>
        <button class="btn-tiempo active" onclick="seleccionarColor('random')"> Aleatorio</button>
        <button class="btn-tiempo" onclick="seleccionarColor('black')">♚ Negras</button>
    </div>

    <button class="btn-tiempo" onclick="window.location.href='/clasificacion'" style="width:100%; margin-top:15px; margin-bottom:10px;">
         Clasificación
    </button>

    <button id="btn-jugar" onclick="iniciarPartida()">JUGAR</button>
    <div id="mensaje-espera">⏳ Buscando rival...</div>
    <button id="btn-cancelar" onclick="cancelarBusqueda()" style="display:none; width:100%; padding:12px; background:#f44336; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer; margin-top:10px;">
         Cancelar búsqueda
    </button>
</div>

<script>
    const socket = io();
    let tiempoElegido = 0;
    let colorElegido = 'random';
    let tiempoPersonalizadoActivo = false;
	
    // Re-registrar sesión al conectar
    socket.on('connect', function() {
        const nickGuardado = localStorage.getItem('nickJugador');
        if (nickGuardado) {
            console.log('🔄 Re-registrando sesión de:', nickGuardado);
            socket.emit('reconectar_sesion', { nick: nickGuardado });
        }
    });

    // NUEVO: Escuchar si nos desconectan por login en otro dispositivo
    socket.on('sesion_cerrada', function(data) {
        alert('⚠️ ' + data.mensaje);
        localStorage.clear();
        window.location.href = '/login.html';
    });

    function seleccionarTiempo(minutos) {
        tiempoElegido = minutos;
        tiempoPersonalizadoActivo = false;
        document.getElementById('minutosPersonalizados').value = '';
        document.querySelectorAll('#selector-tiempo .btn-tiempo').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function usarTiempoPersonalizado(unidad) {
        const input = document.getElementById('minutosPersonalizados');
        const valor = parseInt(input.value);
        
        if (valor && valor > 0) {
            tiempoElegido = valor;
            tiempoPersonalizadoActivo = true;
            
            // Desactivar botones predefinidos
            document.querySelectorAll('#selector-tiempo .btn-tiempo').forEach(b => b.classList.remove('active'));
            
            // Activar botón de minutos
            document.getElementById('btnMinutos').classList.add('active');
            
            console.log('️ Tiempo personalizado:', tiempoElegido, 'minutos');
        } else {
            alert('Por favor, introduce un número válido de minutos');
        }
    }

    function seleccionarColor(color) {
        colorElegido = color;
        document.querySelectorAll('#selector-color .btn-tiempo').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function iniciarPartida() {
        let incremento = document.getElementById('incremento').value;
        
        // Si hay tiempo personalizado, usarlo
        if (tiempoPersonalizadoActivo) {
            const input = document.getElementById('minutosPersonalizados');
            const valor = parseInt(input.value);
            if (valor && valor > 0) {
                tiempoElegido = valor;
            }
        }
        
        if (tiempoElegido === 0) {
            alert("Por favor, selecciona un tiempo.");
            return;
        }

        // Desactivar botón y mostrar mensaje
        document.getElementById('btn-jugar').disabled = true;
        document.getElementById('mensaje-espera').style.display = 'block';
        document.getElementById('btn-cancelar').style.display = 'block';

        // Guardar configuración
        localStorage.setItem('tiempoPartida', tiempoElegido);
        localStorage.setItem('incrementoPartida', incremento);
        localStorage.setItem('colorElegido', colorElegido);

        // Obtener nick del jugador
        let nickJugador = localStorage.getItem('nickJugador') || 'Anónimo';

        // Enviar al servidor para buscar rival
        socket.emit('buscar_partida', {
            tiempo: tiempoElegido,
            incremento: incremento,
            color: colorElegido,
            usuario: nickJugador
        });
    }

    // Cuando el servidor encuentra rival
    socket.on('partida_encontrada', function(data) {
        console.log('✅ Partida encontrada:', data);
        document.getElementById('btn-cancelar').style.display = 'none';
        
        // Guardar datos de la partida
        localStorage.setItem('salaId', data.sala);
        localStorage.setItem('miColor', data.color);
        localStorage.setItem('rivalNick', data.rival_nick || 'Rival');
        
        // Guardar ELOs
        localStorage.setItem('miElo', data.mi_elo || 1200);
        localStorage.setItem('rivalElo', data.rival_elo || 1200);
        
        // Ir al tablero
        window.location.href = "tablero.html";
    });
    
    // Error al registrar nick (límite de IPs)
    socket.on('error_registro', function(data) {
        alert('⚠️ ' + data.mensaje);
        // Reactivar botón
        document.getElementById('btn-jugar').disabled = false;
        document.getElementById('mensaje-espera').style.display = 'none';
        document.getElementById('btn-cancelar').style.display = 'none';
    });

    // Mientras espera rival
    socket.on('esperando_rival', function(data) {
        console.log('⏳', data.mensaje);
        document.getElementById('mensaje-espera').innerText = '⏳ ' + data.mensaje;
    });
    
    function cancelarBusqueda() {
        socket.emit('cancelar_busqueda');
        document.getElementById('btn-jugar').disabled = false;
        document.getElementById('mensaje-espera').style.display = 'none';
        document.getElementById('btn-cancelar').style.display = 'none';
        console.log('❌ Búsqueda cancelada');
    }
</script>
</body>
